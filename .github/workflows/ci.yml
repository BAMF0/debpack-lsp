name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install man-db (for debhelper man-page scraping tests)
        run: sudo apt-get update && sudo apt-get install -y man-db debhelper

      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::gofmt found unformatted files:"
            gofmt -l .
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.txt
          fail_ci_if_error: false

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cross-compile binaries
        run: make vscode-cross-compile

      - name: Build extension
        run: |
          cp LICENSE vscode-ext/LICENSE
          cd vscode-ext && npm ci && npm run build

      - name: Package .vsix
        run: |
          cd vscode-ext && npx @vscode/vsce package --no-dependencies

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: debpack-lsp-vscode
          path: vscode-ext/*.vsix
          retention-days: 30
